name: SonarCloud

on:
  push: 
    branches:
      - main
  pull_request:

jobs: 
  sonarcloud: 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install deps
        run: npm i

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey:giamimino_NeuroPost
            -Dsonar.organization:giamimino
            -Dsonar.host.url=https://sonarcloud.io